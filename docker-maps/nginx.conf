# ─────────────────────────────────────────────────────────────────────
# nginx.conf — Map-server reverse proxy
#
# Port 8081 (public):
#   GET  /health             → always 200 OK (Docker HEALTHCHECK)
#   GET  /status             → serves /tmp/map-status.json written by orchestrator
#   GET  /{scope}/<file>     → static file served from /data/{scope}/ (symlinks resolved)
#   PUT  /{scope}            → proxied to internal Python kickoff server (port 8082)
#                              wakes the background worker to start download/extract
#   DELETE /{scope}          → proxied to port 8082 to clear tiles in that scope
# ─────────────────────────────────────────────────────────────────────

server {
    listen 8081;
    server_name _;

    # ── Always-up health endpoint ────────────────────────────────────
    location = /health {
        add_header Content-Type text/plain;
        return 200 "ok";
    }

    # ── Background worker status (JSON file, no cache) ───────────────
    location = /status {
        root /tmp;
        default_type application/json;
        try_files /map-status.json =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Access-Control-Allow-Origin "*";
    }

    # ── Static PMTiles file serving (supports HTTP Range requests) ───
    # MapLibre's pmtiles:// protocol fetches raw byte ranges from the
    # .pmtiles file itself — nginx handles this natively via sendfile.
    # go-pmtiles serve (Z/X/Y proxy) is not needed for this use case.
    #
    # PMTiles files are browser-cached for 7 days so repeated pan/zoom
    # over the same area hits the disk cache instead of re-fetching the
    # same byte ranges from the server.  ETag + Last-Modified are set
    # automatically by nginx, so conditional (If-Range) requests still
    # work correctly after the file is updated.
    location ~* \.pmtiles$ {
        limit_except GET HEAD OPTIONS {
            proxy_pass http://127.0.0.1:8082;
        }
        root /data;
        try_files $uri =404;
        add_header Cache-Control                 "public, max-age=2678400, immutable"       always;
        add_header Access-Control-Allow-Origin   "*"                                        always;
        add_header Access-Control-Allow-Headers  "Range, Origin, X-Requested-With, Accept" always;
        add_header Access-Control-Expose-Headers "Content-Length, Content-Range, Accept-Ranges, ETag" always;
    }

    location / {
        limit_except GET HEAD OPTIONS {
            proxy_pass http://127.0.0.1:8082;
        }
        root /data;
        try_files $uri =404;
        add_header Access-Control-Allow-Origin   "*"                                        always;
        add_header Access-Control-Allow-Headers  "Range, Origin, X-Requested-With, Accept" always;
        add_header Access-Control-Expose-Headers "Content-Length, Content-Range, Accept-Ranges" always;
    }
}
