x-db-environment: &db-environment
  POSTGRES_DB: mtl
  POSTGRES_USER: mtluser
  POSTGRES_PASSWORD: ${MTL_POSTGRES_PASSWORD:-MtlSuper123}

x-image-pull-policy: &image-pull-policy ${MTL_IMAGE_PULL_POLICY:-always}

services:
  db:
    image: postgis/postgis:18-3.6
    environment:
      <<: *db-environment
    restart: unless-stopped
    volumes:
      - ./data/postgis:/var/lib/postgresql/18/docker
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mtluser -d mtl"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 256m
    command: >
      postgres
      -c shared_buffers=128MB
      -c effective_cache_size=512MB
      -c work_mem=8MB
      -c maintenance_work_mem=64MB
      -c max_wal_size=256MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=8MB
      -c synchronous_commit=off

  app:
    # ${MTL_APP_IMAGE:-...} means: use MTL_APP_IMAGE when it is set,
    # otherwise use the published image. Example local override:
    # MTL_APP_IMAGE=mytraillog:local MTL_IMAGE_PULL_POLICY=never docker compose up -d
    image: ${MTL_APP_IMAGE:-wauwau0977/mytraillog:latest}
    pull_policy: *image-pull-policy
    depends_on:
      db:
        condition: service_healthy
      brouter:
        condition: service_started
      location-search:
        condition: service_started
    environment:
      <<: *db-environment
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/mtl
      SPRING_DATASOURCE_USERNAME: mtluser
      SPRING_DATASOURCE_PASSWORD: ${MTL_POSTGRES_PASSWORD:-MtlSuper123}
      MTL_DB_READONLY_PASSWORD: ${MTL_DB_READONLY_PASSWORD:-MtlSuper123}
      MTL_USER_LOGIN: ${MTL_USER_LOGIN:-mtl}
      MTL_USER_PASSWORD: ${MTL_USER_PASSWORD:-change-me}
      MTL_PLANNER_ENABLED: "true"
      MTL_PLANNER_BROUTER_BASE_URL: http://brouter:17777
      MTL_PLANNER_STATUS_URL: http://brouter:17778/status
      MTL_LOCATION_SEARCH_STATUS_URL: http://location-search:8083/status
      MTL_LOCATION_SEARCH_QUERY_URL: http://location-search:8083/search
      SERVER_SSL_ENABLED: "false"
    ports:
      - "18080:8080"
    restart: unless-stopped
    volumes:
      - ./data/gpx:/app/gpx
      - ./data/media:/app/media:ro
      - ./data/logs:/app/logs
      # Optional Spring Boot overrides for this local checkout:
      # - ./application.yml:/app/config/application.yml:ro
    deploy:
      resources:
        limits:
          memory: 1536m
        reservations:
          memory: 512m

  map-server:
    # Optional local PMTiles sidecar. Disabled by default; enable with:
    # docker compose --profile local-maps up -d
    # Without this profile, the app uses the hosted PMTiles service.
    profiles: ["local-maps"]
    # Override with MTL_MAP_IMAGE=mytraillog-maps:local and MTL_IMAGE_PULL_POLICY=never when testing a local build.
    image: ${MTL_MAP_IMAGE:-wauwau0977/mytraillog-maps:latest}
    pull_policy: *image-pull-policy
    ports:
      - "18081:8081"
    environment:
      PORT: "8081"
      LOWZOOM_MAXZOOM: "6"
      MAP_DOWNLOAD_URL: latest
    restart: unless-stopped
    volumes:
      - ./data/maps:/data
    deploy:
      resources:
        limits:
          memory: 1024m
        reservations:
          memory: 256m

  location-search:
    image: ${MTL_LOCATION_SEARCH_IMAGE:-wauwau0977/mytraillog-location-search:latest}
    pull_policy: *image-pull-policy
    expose:
      - 8083
    ports:
      - "18083:8083"
    environment:
      PORT: "8083"
      MTL_LOCATION_SEARCH_DB: /data/geonames-search.sqlite
    restart: unless-stopped
    # Optional local override when building the GeoNames DB yourself:
    # volumes:
    #   - ./data/location-search/geonames-search.sqlite:/data/geonames-search.sqlite:ro
    deploy:
      resources:
        limits:
          memory: 256m
        reservations:
          memory: 64m

  brouter:
    # Override with MTL_BROUTER_IMAGE=mytraillog-brouter:local and MTL_IMAGE_PULL_POLICY=never when testing a local build.
    image: ${MTL_BROUTER_IMAGE:-wauwau0977/mytraillog-brouter:latest}
    pull_policy: *image-pull-policy
    expose:
      - 17777
      - 17778
    environment:
      BROUTER_JAVA_XMX: "512m"
    restart: unless-stopped
    volumes:
      - ./data/brouter-segments:/segments4
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 256m
