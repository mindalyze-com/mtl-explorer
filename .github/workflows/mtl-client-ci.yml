name: mtl-client CI

on:
  push:
    branches: [main, develop, 'arch/**', 'feature/**']
    paths:
      - 'mtl-client/**'
      - '.github/workflows/mtl-client-ci.yml'
  pull_request:
    paths:
      - 'mtl-client/**'
      - '.github/workflows/mtl-client-ci.yml'

defaults:
  run:
    working-directory: mtl-client

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mtl-client/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npm run lint || echo "::warning::lint reported issues (non-blocking baseline)"
      - run: npm run format:check || echo "::warning::prettier reported issues (non-blocking baseline)"
      - run: npm test
      # Skip full type-check + build in CI for now — they require the generated
      # OpenAPI client at ../mtl-api/.../target/generated-sources to exist.
      # Re-enable once the maven build step is added to the workflow.
